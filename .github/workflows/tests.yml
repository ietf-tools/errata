name: Run Tests

on:
  pull_request: {}
  push:
    paths-ignore:
      - '.devcontainer/**'
      - '.github/**'
      - '.vscode/**'
      - 'k8s/**'
      - 'README.md'
  workflow_dispatch: {}

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Run all tests
      run: |
          ./manage.py test
